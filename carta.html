<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz 18</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    overflow:hidden;
    background:#000;
    color:white;
}

.screen{
    position:absolute;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

#loveScreen{
    background:linear-gradient(to bottom,#000,#1a0000);
}

#cakeScreen{
    display:none;
    background:linear-gradient(to bottom,#000,#120000);
}

.kanji{
    font-size:140px;
    color:#ff2d55;
    cursor:pointer;
    transition:.5s;
    text-shadow:0 0 30px #ff2d55;
    animation:pulse 2s infinite;
}

.kanji:hover{
    transform:scale(1.1);
}

.tap{
    margin-top:15px;
    color:#ddd;
    font-size:18px;
}

@keyframes pulse{
    0%,100%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.08);
    }
}

.cake{
    font-size:160px;
    cursor:pointer;
    animation:float 2s infinite ease-in-out;
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-15px);
    }
}

.message{
    display:none;
    position:absolute;
    text-align:center;
    padding:20px;
}

.message h1{
    color:gold;
    font-size:3rem;
    text-shadow:0 0 20px gold;
}

.message p{
    margin-top:15px;
    font-size:1.2rem;
}

.money{
    position:absolute;
    font-size:35px;
    animation:fall linear forwards;
}

@keyframes fall{
    from{
        transform:translateY(-100px) rotate(0deg);
    }
    to{
        transform:translateY(120vh) rotate(720deg);
    }
}

.firework{
    position:absolute;
    width:8px;
    height:8px;
    border-radius:50%;
    background:gold;
    animation:explode 1s forwards;
}

@keyframes explode{
    from{
        transform:scale(1);
        opacity:1;
    }
    to{
        transform:scale(8);
        opacity:0;
    }
}

.sakura{
    position:absolute;
    color:rgb(80, 6, 18);
    font-size:20px;
    animation:fall linear infinite;
}
</style>
</head>
<body>

<div id="loveScreen" class="screen">
    <div class="kanji" onclick="showCake()">愛</div>
    <div class="tap">Tócalo...</div>
</div>

<div id="cakeScreen" class="screen">
    <div class="cake" onclick="birthdayExplosion()">🎂</div>

    <div class="message" id="message">
        <h1>✨ Destinado a la riqueza eterna ✨</h1>
        <p>
            
            
            
            Por una vida llena de muchisimoooo éxito , libertad y dinero .
            

            <br><br>
            
            🎉 Feliz Cumpleaños Santyy 🎉
        </p>
    </div>
</div>

<script>

function showCake(){
    document.getElementById("loveScreen").style.display="none";
    document.getElementById("cakeScreen").style.display="flex";
}

function birthdayExplosion(){

    createMoney();
    createFireworks();

    document.getElementById("message").style.display="block";
}

function createMoney(){

    for(let i=0;i<100;i++){

        let money=document.createElement("div");

        const items=["💵","💸"];

        money.innerHTML=items[Math.floor(Math.random()*items.length)];

        money.classList.add("money");

        money.style.left=Math.random()*100+"vw";
        money.style.animationDuration=(3+Math.random()*4)+"s";

        document.body.appendChild(money);

        setTimeout(()=>{
            money.remove();
        },7000);
    }
}

function createFireworks(){

    for(let i=0;i<40;i++){

        let fw=document.createElement("div");

        fw.classList.add("firework");

        fw.style.left=Math.random()*100+"vw";
        fw.style.top=Math.random()*100+"vh";

        document.body.appendChild(fw);

        setTimeout(()=>{
            fw.remove();
        },1000);
    }
}

function createSakura(){

    let petal=document.createElement("div");

    petal.innerHTML="🌸";
    petal.classList.add("sakura");

    petal.style.left=Math.random()*100+"vw";
    petal.style.animationDuration=(5+Math.random()*5)+"s";

    document.body.appendChild(petal);

    setTimeout(()=>{
        petal.remove();
    },10000);
}

setInterval(createSakura,400);

</script>

</body>
</html>
